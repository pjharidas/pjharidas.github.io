<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prathmesh Haridas | Full-Stack AI Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D1117;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --text-main: #c9d1d9;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3.5rem;
            color: var(--accent-blue);
            margin: 0;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
            animation: fadeIn 1.5s ease-out;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }

        .stat-value {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-green);
        }

        .btn-group {
            margin-top: 30px;
        }

        .btn {
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            margin: 10px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: var(--bg);
        }

        .btn-secondary {
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn:hover {
            opacity: 0.8;
            box-shadow: 0 0 15px var(--accent-blue);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>> Prathmesh Haridas</h1>
        <p class="subtitle">Building Intelligent Multi-Platform Ecosystems</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value">4+ Years</span>
                <span>Flutter Exp</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">500+</span>
                <span>DSA Solved</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">265+</span>
                <span>Prod Commits</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">B.Tech</span>
                <span>AI & DS [cite: 5]</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://github.com/PrathmeshHaridas" class="btn btn-primary">View GitHub</a>
            <a href="mailto:prathmeshharidas@gmail.com" class="btn btn-secondary">Contact Me</a>
        </div>
    </div>
</body>
</html>
